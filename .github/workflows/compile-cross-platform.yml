# =============================================================================
# HoneyDew 跨平台编译工作流
# 支持 macOS、Ubuntu、Windows 三平台自动编译与产物归档
# =============================================================================

name: 跨平台编译

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  # ===========================================================================
  # macOS 编译
  # ===========================================================================
  compile-macos:
    name: 编译 - macOS
    runs-on: macos-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          brew install libssh cmake pkg-config

      - name: 代码质量检查
        run: |
          echo "::group::检查源文件编码与格式"
          # 验证所有 .c/.h 文件语法正确性（预处理检查）
          for f in main.c src/service/*.c src/utilities/*.c; do
            gcc -std=c99 -fsyntax-only \
              -I./include \
              -I$(brew --prefix libssh)/include \
              "$f" 2>&1 && echo "[通过] $f" || echo "::error::[失败] $f"
          done
          echo "::endgroup::"

      - name: 配置 CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_C_COMPILER=gcc

      - name: 编译
        run: |
          cmake --build build --config ${{ env.BUILD_TYPE }} -j$(sysctl -n hw.ncpu)

      - name: 验证构建产物
        run: |
          echo "::group::构建产物检查"
          ls -la build/蜜罐
          file build/蜜罐
          echo "---"
          ls -la build/keys/
          echo "::endgroup::"

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: honeydew-macos
          path: |
            build/蜜罐
            build/keys/
          retention-days: 30

  # ===========================================================================
  # Ubuntu 编译
  # ===========================================================================
  compile-ubuntu:
    name: 编译 - Ubuntu
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            libssh-dev

      - name: 代码质量检查
        run: |
          echo "::group::检查源文件编码与格式"
          for f in main.c src/service/*.c src/utilities/*.c; do
            gcc -std=c99 -fsyntax-only \
              -I./include \
              $(pkg-config --cflags libssh 2>/dev/null) \
              "$f" 2>&1 && echo "[通过] $f" || echo "::error::[失败] $f"
          done
          echo "::endgroup::"

      - name: 配置 CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: 编译
        run: |
          cmake --build build --config ${{ env.BUILD_TYPE }} -j$(nproc)

      - name: 验证构建产物
        run: |
          echo "::group::构建产物检查"
          ls -la build/蜜罐
          file build/蜜罐
          ldd build/蜜罐 || true
          echo "---"
          ls -la build/keys/
          echo "::endgroup::"

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: honeydew-ubuntu
          path: |
            build/蜜罐
            build/keys/
          retention-days: 30

  # ===========================================================================
  # Windows 编译
  # ===========================================================================
  compile-windows:
    name: 编译 - Windows
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装依赖 (vcpkg)
        run: |
          vcpkg install libssh:x64-windows
          echo "CMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake" >> $env:GITHUB_ENV

      - name: 配置 CMake
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_TOOLCHAIN_FILE="$env:CMAKE_TOOLCHAIN_FILE" `
            -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: 编译
        run: |
          cmake --build build --config ${{ env.BUILD_TYPE }} -j $env:NUMBER_OF_PROCESSORS

      - name: 验证构建产物
        shell: pwsh
        run: |
          Write-Host "::group::构建产物检查"
          $binaries = Get-ChildItem -Path build -Recurse -Include "*.exe"
          if ($binaries.Count -eq 0) {
            Write-Host "::error::未找到编译产物 (.exe)"
            exit 1
          }
          foreach ($bin in $binaries) {
            Write-Host "[产物] $($bin.FullName) ($([math]::Round($bin.Length / 1KB, 1)) KB)"
          }
          Write-Host "::endgroup::"

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: honeydew-windows
          path: |
            build/${{ env.BUILD_TYPE }}/*.exe
            build/keys/
          retention-days: 30

  # ===========================================================================
  # 构建状态汇总
  # ===========================================================================
  build-summary:
    name: 构建汇总
    runs-on: ubuntu-latest
    needs: [compile-macos, compile-ubuntu, compile-windows]
    if: always()

    steps:
      - name: 检查构建结果
        run: |
          echo "========================================="
          echo "  HoneyDew 跨平台构建结果"
          echo "========================================="
          echo ""
          echo "  macOS:   ${{ needs.compile-macos.result }}"
          echo "  Ubuntu:  ${{ needs.compile-ubuntu.result }}"
          echo "  Windows: ${{ needs.compile-windows.result }}"
          echo ""
          echo "========================================="

          if [ "${{ needs.compile-macos.result }}" = "failure" ] || \
             [ "${{ needs.compile-ubuntu.result }}" = "failure" ] || \
             [ "${{ needs.compile-windows.result }}" = "failure" ]; then
            echo "::error::一个或多个平台编译失败"
            exit 1
          fi

          echo "所有平台编译成功"
